bg);color:var(--text);font-size:15px;outline:none;transition:border-color var(--tr),box-shadow var(--tr)}.txt-inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(13,122,130,.12)}.txt-inp.err{border-color:#e74c3c;box-shadow:0 0 0 3px rgba(231,76,60,.10)}.err-hint{font-size:12px;color:#e74c3c;margin-top:5px;display:none}.err-hint.show{display:block}.m-actions{display:flex;justify-content:flex-end;gap:10px}.btn-cancel{padding:9px 18px;border-radius:var(--rad-md);font-size:14px;font-weight:600;color:var(--primary);transition:background var(--tr)}.btn-cancel:hover{background:var(--primary-hl)}.btn-ok{padding:9px 22px;border-radius:var(--rad-md);font-size:14px;font-weight:700;background:var(--primary);color:#fff;transition:background var(--tr),opacity var(--tr)}.btn-ok:hover:not(:disabled){background:var(--primary-h)}.btn-ok:disabled{opacity:.4;cursor:not-allowed}.btn-ok.amber{background:#d97706}.btn-ok.amber:hover:not(:disabled){background:#b45309}.btn-danger{padding:9px 22px;border-radius:var(--rad-md);font-size:14px;font-weight:700;background:#dc2626;color:#fff;transition:background var(--tr)}.btn-danger:hover{background:#b91c1c}

  const STORAGE_KEY='pausentool_slots';
const STORAGE_LOG='pausentool_log';
const ADMIN_KEY='pausentool_admin';
const SLOTS=4;
const DUR_MIN=10;

let slots=[];let logEntries=[];let isAdmin=false;let tmpSlot=null;let tmpDur=null;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDt(d){if(!d)return '<span style="color:var(--faint)">--:--</span>';const x=new Date(d);return x.toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit'});}
function coffeeSVG(sz=46){return '<svg class="coff" width="'+sz+'" height="'+sz+'" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path stroke-width="2.8" d="M12 24h32l-3 24H15L12 24z"/><path stroke-width="2.8" d="M44 28h4a6 6 0 0 1 0 12h-4"/><path stroke-width="2.5" d="M10 52h44"/><path stroke-width="2.2" d="M22 18 Q24 13 22 9"/><path stroke-width="2.2" d="M30 16 Q32 11 30 7"/><path stroke-width="2.2" d="M38 18 Q40 13 38 9"/></svg>';}
function loadState(){try{slots=JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch(e){slots=[]}try{logEntries=JSON.parse(localStorage.getItem(STORAGE_LOG))||[]}catch(e){logEntries=[]}try{isAdmin=localStorage.getItem(ADMIN_KEY)==='1'}catch(e){isAdmin=false}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(slots));localStorage.setItem(STORAGE_LOG,JSON.stringify(logEntries));renderSlots();renderTable();syncRemoveTimers();}
function syncRemoveTimers(){if(!slots||!slots.length)return;slots.forEach((s,i)=>{if(s.status==='occ'&&s.end_time&&Date.now()>s.end_time+30000){s.status='free';s.name='';s.start_time=null;s.end_time=null;s.end_time=null;logEntries.push({id:Date.now(),name:s.name||'',slot:s.slot,start_time:s.start_time,end_time:Date.now(),status:'done'});s.name='';s.start_time=null;s.end_time=null}s.start_time=null}s.end_time=null}s.end_time=null}s.end_time=null}s.end_time=null}s.end_time=null}s.end_time=null}s.end_time=null}s.end_time=null}s.end_time=null}s.end_time=null}s.end_time=null};saveState();}
function renderSlots(){const occ=slots.filter(s=>s.status==='occ').length;document.getElementById('slotCount').textContent=occ+' / '+SLOTS+' belegt';const grid=document.getElementById('slotsGrid');grid.innerHTML='';for(let i=1;i<=SLOTS;i++){const s=slots[i-1]||{slot:i,status:'free',name:'',start_time:null,end_time:null};const el=document.createElement('div');el.className='slot-card '+(s.status==='free'?'free':s.status==='occ'?'occ':'locked');el.setAttribute('data-slot',i);let inner='<div class="slot-lbl">'+(s.status==='free'?'Frei':'Belegt')+'</div><div class="slot-icon-box">'+coffeeSVG()+'</div>';
if(s.status==='occ'){inner+='<span class="slot-agent">'+esc(s.name)+'</span><span class="slot-cd" id="cd-'+s.slot+'">--:--</span><span class="slot-hint">Pause aktiv</span>'}else if(s.status==='free'){inner+='<span class="slot-hint">Klicken zum Starten</span>'}else{inner+='<span class="slot-hint">Gesperrt</span>'}
if(isAdmin){inner+='<div class="slot-admin-bar"><adm-btn class="adm-btn-lock" onclick="toggleLock('+i+','+(s.status==='locked'?0:1)+')">'+(s.status==='locked'?'Entsperren':'Sperren')+'</adm-btn>'+(s.status==='occ'?'<adm-btn class="adm-btn-release" onclick="confirmRelease('+i+')">Freigeben</adm-btn>':'')+'</div>'}
else{inner+='<div class="slot-admin-bar"><adm-btn class="adm-btn-lock" onclick="toggleLock('+i+','+(s.status==='locked'?0:1)+')">'+(s.status==='locked'?'Entsperren':'Sperren')+'</adm-btn>'+(s.status==='occ'?'<adm-btn class="adm-btn-release" onclick="confirmRelease('+i+')">Freigeben</adm-btn>':'')+'</div>'}
el.innerHTML=inner;grid.appendChild(el)}}
function renderTable(){const tbody=document.getElementById('tblBody');tbody.innerHTML='';const visible=logEntries.filter(e=>e.active||e.end_time&&(Date.now()-e.end_time)<300000);if(!visible.length){tbody.innerHTML='<tr class="empty-row"><td colspan="5">Noch keine Pausen</td></tr>';return}visible.forEach(e=>{const tr=document.createElement('tr');const active=(Date.now()-e.end_time)<300000?e.end_time:null;const done=e.end_time&&!active;tr.innerHTML='<td class="td-name">'+esc(e.name)+'</td><td class="td-time">'+fmtDt(e.start_time)+'</td><td class="td-time">'+(active?e.end_time?'--:--':'-':fmtDt(e.end_time))+'</td><td class="td-slot">'+e.slot+'</td><td class="td-status"><span class="'+(done?'b-done':'b-active')+'">'+(done?'Erledigt':'Aktiv')+'</span></td>';tbody.appendChild(tr)})}
function updateCountdowns(){slots.forEach(s=>{if(s.status!=='occ'||!s.end_time)return;const el=document.getElementById('cd-'+s.slot);if(!el)return;const r=s.end_time-Date.now();if(r<=0){el.textContent='Jetzt';setTimeout(()=>{s.status='free';s.name='';s.start_time=null;s.end_time=null;saveState();},1000)}else{const m=Math.floor(r/60000);const sec=Math.floor(r%60000/1000);el.textContent=m+':'+(sec<10?'0':'')+sec;setTimeout(updateCountdowns,1000)}})}
function openStep1(slotId){tmpSlot=slotId;tmpDur=null;document.getElementById('mBody').innerHTML='<div class="m-icon">'+coffeeSVG(26)+'</div><div class="m-title">Slot '+slotId+' – Dauer wählen</div><div class="m-sub">Wie lange soll die Pause sein?</div><div class="dur-grid"><div class="dur-btn sel" data-dur="10"><span class="dur-num">10</span><span class="dur-unit">Minuten</span></div><div class="dur-btn" data-dur="15"><span class="dur-num">15</span><span class="dur-unit">Minuten</span></div></div><div class="inp-wrap"><label class="inp-lbl">Dein Name</label><input class="txt-inp" id="nameInp" type="text" placeholder="Vorname Nachname" autocomplete="off"></div><div class="m-actions"><button class="btn-cancel" onclick="closeModal()">Abbrechen</button><button class="btn-ok" id="okBtn" onclick="pickDur(10)">Weiter</button></div>';
const nameInp=document.getElementById('nameInp');const okBtn=document.getElementById('okBtn');nameInp.addEventListener('input',()=>{if(nameInp.value.trim().length>=2){okBtn.disabled=false}else{okBtn.disabled=true}});
document.querySelectorAll('.dur-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.dur-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');tmpDur=parseInt(b.dataset.dur)}));
document.getElementById('overlay').classList.add('show')}
function pickDur(min){tmpDur=min||tmpDur||10;const nameInp=document.getElementById('nameInp');const name=nameInp.value.trim();if(!name||name.length<2){nameInp.classList.add('err');document.getElementById('nameInp').focus();return}nameInp.classList.remove('err');const now=Date.now();slots[tmpSlot-1]={slot:tmpSlot,status:'occ',name:name,start_time:now,end_time:now+tmpDur*60000};
logEntries.push({id:Date.now(),name:name,slot:tmpSlot,start_time:now,end_time:null,status:'active'});
saveState();closeModal();showToast('Pause gestartet – '+tmpDur+' min');updateCountdowns()}
function openAdminLogin(){if(isAdmin){adminLogout();return}document.getElementById('mBody').innerHTML='<div class="m-icon admin-ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div class="m-title">Admin-Login</div><div class="m-sub">Bitte das Passwort eingeben</div><div class="inp-wrap"><label class="inp-lbl">Passwort</label><input class="txt-inp" id="passInp" type="password" placeholder="Passwort" autocomplete="off"></div><div class="m-actions"><button class="btn-cancel" onclick="closeModal()">Abbrechen</button><button class="btn-ok" id="okBtn" onclick="checkAdminPass()">Anmelden</button></div>';
document.getElementById('overlay').classList.add('show');document.getElementById('passInp').focus()}
function checkAdminPass(){const inp=document.getElementById('passInp');try{const p=inp.value;if(p==='teamleiter2026'){isAdmin=true;localStorage.setItem(ADMIN_KEY,'1');closeModal();applyState();showToast('Admin-Modus aktiv');document.getElementById('adminBtn').classList.add('active-admin')}else{inp.classList.add('err');inp.focus()}}catch(e){}}
function adminLogout(){isAdmin=false;localStorage.removeItem(ADMIN_KEY);document.getElementById('adminStrip').classList.remove('show');document.getElementById('adminBtn').classList.remove('active-admin');applyState();showToast('Abgemeldet')}
function toggleLock(slotId,lock){const s=slots[slotId-1];if(!s)return;s.status=lock?'locked':'free';if(lock){s.name='';s.start_time=null;s.end_time=null}saveState();showToast(lock?'Slot '+slotId+' gesperrt':'Slot '+slotId+' freigegeben')}
function confirmRelease(slotId){document.getElementById('mBody').innerHTML='<div class="m-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div><div class="m-title">Pause vorzeitig beenden?</div><div class="m-sub">Slot '+slotId+' wird freigegeben</div><div class="m-actions"><button class="btn-cancel" onclick="closeModal()">Abbrechen</button><button class="btn-danger" onclick="doRelease('+slotId+')">Beenden</button></div>';document.getElementById('overlay').classList.add('show')}
function doRelease(slotId){const s=slots[slotId-1];if(s&&s.status==='occ'){s.status='free';s.name='';s.start_time=null;s.end_time=null;logEntries.push({id:Date.now(),name:s.name||'',slot:slotId,start_time:s.start_time,end_time:Date.now(),status:'done'});saveState();closeModal();showToast('Pause beendet');updateCountdowns()}}
function showMod(){document.getElementById('overlay').classList.add('overlay');document.getElementById('overlay').classList.remove('overlay');document.getElementById('overlay').classList.add('show');document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal()});closeModal=function(){document.getElementById('overlay').classList.remove('show')}
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
(function(){const btn=document.getElementById('themeBtn');const ico=document.getElementById('themeIco');const html=document.documentElement;let theme=localStorage.getItem('pt_theme')||'light';html.setAttribute('data-theme',theme);ico.innerHTML=theme==='dark'?'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>':'<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';btn.addEventListener('click',()=>{theme=theme==='light'?'dark':'light';html.setAttribute('data-theme',theme);localStorage.setItem('pt_theme',theme);ico.innerHTML=theme==='dark'?'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>':'<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>'})})();
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}
function applyState(){loadState();renderSlots();renderTable();updateCountdowns();if(isAdmin){document.getElementById('adminBtn').classList.add('active-admin');document.getElementById('adminStrip').classList.add('show')}}
loadState();
renderSlots();
renderTable();
updateClock();
setInterval(updateClock,1000);
applyState();
document.getElementById('slotsGrid').addEventListener('click',e=>{const card=e.target.closest('.slot-card');if(!card)return;const slotId=parseInt(card.dataset.slot);const s=slots[slotId-1];if(s&&s.status==='free')openStep1(slotId)});
document.getElementById('themeBtn').addEventListener('click',()=>{});
document.getElementById('adminBtn').addEventListener('click',openAdminLogin);
</script>
</body>
</html>
