  <style>

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0} html{-webkit-font-smoothing:antialiased} body{min-height:100dvh;font-family:var(--font);font-size:16px;color:var(--text);background:var(--bg);line-height:1.5} button{cursor:pointer;background:none;border:none;font:inherit;color:inherit} input{font:inherit;color:inherit}

    .status-chip.ok{color:var(--success);background:var(--success-bg)} .status-chip.err{color:var(--belegt-tx);background:var(--belegt-bg);border-color:var(--belegt-bd)}
    .icon-btn{width:36px;height:36px;border-radius:var(--rad-full);display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background var(--tr),color var(--tr)} .icon-btn:hover{background:var(--surf-off);color:var(--text)} .icon-btn.active-admin{color:var(--admin-bd)}
    .main{max-width:1000px;margin:0 auto;padding:28px 24px 56px}.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.sec-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}.sec-title svg{color:var(--primary)}.slot-count{font-size:12px;font-weight:600;padding:3px 10px;border-radius:var(--rad-full);background:var(--surface);border:1px solid var(--border);color:var(--muted)}
    .slots-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:36px}.slot-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--rad-xl);padding:14px 12px 12px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:8px;cursor:pointer;transition:all var(--tr);min-height:180px;box-shadow:var(--sh-sm);user-select:none;position:relative}.slot-card.free:hover{border-color:var(--primary);background:var(--primary-hl);box-shadow:var(--sh-md);transform:translateY(-3px)}.slot-card.free:active{transform:translateY(-1px)}.slot-card.occ{background:var(--belegt-bg);border-color:var(--belegt-bd);cursor:default}.slot-card.locked{background:var(--locked-bg);border-color:var(--locked-bd);cursor:not-allowed;opacity:.85}
    .slot-lbl{align-self:flex-start;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}.slot-card.occ .slot-lbl{color:var(--belegt-tx);opacity:.7}.slot-card.locked .slot-lbl{color:var(--locked-tx)}.slot-icon-box{width:78px;height:78px;border-radius:var(--rad-lg);background:var(--surf-off);display:flex;align-items:center;justify-content:center;transition:background var(--tr);flex-shrink:0}.slot-card.occ .slot-icon-box{background:rgba(185,28,28,.08)}.slot-card.locked .slot-icon-box{background:rgba(0,0,0,.04)}.slot-card.free:hover .slot-icon-box{background:rgba(13,122,130,.08)}.coff{color:var(--faint);transition:color var(--tr)}.slot-card.occ .coff{color:var(--belegt-tx)}.slot-card.free:hover .coff{color:var(--primary)}.slot-card.locked .coff{opacity:.4}.slot-badge{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--belegt-tx);background:rgba(185,28,28,.1);padding:2px 8px;border-radius:var(--rad-full)}.slot-locked-badge{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--locked-tx);display:flex;align-items:center;gap:4px}.slot-agent{font-size:13px;font-weight:700;color:var(--belegt-tx);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}.slot-cd{font-size:13px;font-weight:700;color:var(--belegt-tx);font-variant-numeric:tabular-nums}.slot-hint{font-size:11px;color:var(--faint);text-align:center}.slot-card.free:hover .slot-hint{color:var(--primary)}
    .slot-admin-bar{display:none;position:absolute;bottom:0;left:0;right:0;padding:6px 8px;border-top:1px solid var(--border);border-radius:0 0 calc(var(--rad-xl) - 2px) calc(var(--rad-xl) - 2px);background:rgba(245,158,11,.08);gap:5px;justify-content:center}.is-admin .slot-admin-bar{display:flex}.adm-btn{font-size:11px;font-weight:700;padding:3px 9px;border-radius:var(--rad-full);transition:all var(--tr);display:flex;align-items:center;gap:4px}.adm-btn-lock{background:rgba(0,0,0,.06);color:var(--muted)}.adm-btn-lock:hover{background:var(--locked-bd);color:#333}.adm-btn-unlock{background:rgba(13,122,130,.12);color:var(--primary)}.adm-btn-unlock:hover{background:var(--primary);color:#fff}.adm-btn-release{background:rgba(185,28,28,.1);color:var(--belegt-tx)}.adm-btn-release:hover{background:var(--belegt-tx);color:#fff}
    .tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad-xl);overflow:hidden;box-shadow:var(--sh-sm)} table{width:100%;border-collapse:collapse} thead th{padding:10px 20px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:var(--surf-off);border-bottom:1px solid var(--border)} tbody td{padding:11px 20px;font-size:14px;border-bottom:1px solid var(--divider);color:var(--text);vertical-align:middle} tbody tr:last-child td{border-bottom:none} tbody tr:hover{background:var(--surface2)} .td-slot{font-weight:700;text-align:center;color:var(--primary)} .td-name{font-weight:600} .td-time{font-variant-numeric:tabular-nums;color:var(--muted);font-size:13px}.b-active,.b-done,.b-forced{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:var(--rad-full);font-size:11px;font-weight:700}.b-active{background:var(--belegt-bg);color:var(--belegt-tx);border:1px solid var(--belegt-bd)}.b-done{background:var(--success-bg);color:var(--success)}.b-forced{background:var(--admin-bg);color:var(--admin-tx)}.empty-row td{text-align:center;padding:36px 20px;color:var(--faint);font-size:14px}
    .overlay{position:fixed;inset:0;background:rgba(10,12,20,.55);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 200ms ease}.overlay.show{opacity:1;pointer-events:all}.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:420px;box-shadow:var(--sh-modal);transform:translateY(12px) scale(.97);transition:transform 220ms cubic-bezier(.16,1,.3,1)}.overlay.show .modal{transform:translateY(0) scale(1)}.m-icon{width:50px;height:50px;border-radius:var(--rad-xl);background:var(--primary-hl);display:flex;align-items:center;justify-content:center;margin-bottom:14px;color:var(--primary)}.m-icon.admin-ico{background:var(--admin-bg);color:var(--admin-tx)}.m-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.3}.m-sub{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5}.dur-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}.dur-btn{padding:18px 12px;border:2px solid var(--border);border-radius:var(--rad-lg);background:var(--surface2);cursor:pointer;transition:all var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px}.dur-btn:hover{border-color:var(--primary);background:var(--primary-hl)}.dur-btn.sel{border-color:var(--primary);background:var(--primary-hl);box-shadow:0 0 0 3px rgba(13,122,130,.15)}.dur-num{font-size:30px;font-weight:800;color:var(--text);line-height:1}.dur-btn.sel .dur-num{color:var(--primary)}.dur-unit{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}.dur-btn.sel .dur-unit{color:var(--primary)}.inp-wrap{margin-bottom:18px}.inp-lbl{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block}.txt-inp{width:100%;padding:10px 13px;border:2px solid var(--border);border-radius:var(--rad-md);background:var(--bg);color:var(--text);font-size:15px;outline:none;transition:border-color var(--tr),box-shadow var(--tr)}.txt-inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(13,122,130,.12)}.txt-inp.err{border-color:#e74c3c;box-shadow:0 0 0 3px rgba(231,76,60,.10)}.err-hint{font-size:12px;color:#e74c3c;margin-top:5px;display:none}.err-hint.show{display:block}.m-actions{display:flex;justify-content:flex-end;gap:10px}.btn-cancel{padding:9px 18px;border-radius:var(--rad-md);font-size:14px;font-weight:600;color:var(--primary);transition:background var(--tr)}.btn-cancel:hover{background:var(--primary-hl)}.btn-ok{padding:9px 22px;border-radius:var(--rad-md);font-size:14px;font-weight:700;background:var(--primary);color:#fff;transition:background var(--tr),opacity var(--tr)}.btn-ok:hover:not(:disabled){background:var(--primary-h)}.btn-ok:disabled{opacity:.4;cursor:not-allowed}.btn-ok.amber{background:#d97706}.btn-ok.amber:hover:not(:disabled){background:#b45309}.btn-danger{padding:9px 22px;border-radius:var(--rad-md);font-size:14px;font-weight:700;background:#dc2626;color:#fff;transition:background var(--tr)}.btn-danger:hover{background:#b91c1c}
    .admin-strip{display:none;background:var(--admin-bg);border-bottom:1px solid var(--admin-bd);padding:8px 24px;align-items:center;justify-content:space-between}.admin-strip.show{display:flex}.admin-strip-text{font-size:13px;font-weight:700;color:var(--admin-tx);display:flex;align-items:center;gap:7px}.btn-logout{font-size:12px;font-weight:700;padding:4px 12px;border-radius:var(--rad-full);background:var(--admin-bd);color:#fff;transition:opacity var(--tr)}.btn-logout:hover{opacity:.85}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--rad-full);font-size:13px;font-weight:600;box-shadow:var(--sh-lg);z-index:999;opacity:0;pointer-events:none;transition:all 280ms cubic-bezier(.16,1,.3,1);white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .dept-bar{margin-bottom:20px;display:flex;flex-direction:column;gap:8px}
    .dept-tabs{display:flex;gap:6px}
    .dept-tab{padding:7px 20px;border-radius:var(--rad-full);font-size:13px;font-weight:700;border:2px solid var(--border);background:var(--surface);color:var(--muted);transition:all var(--tr)}
    .dept-tab:hover{border-color:var(--primary);color:var(--primary)}
    .dept-tab.active{border-color:var(--primary);background:var(--primary);color:#fff}
    .sub-tabs{display:flex;gap:6px;padding-left:2px}
    .sub-tab{padding:5px 16px;border-radius:var(--rad-full);font-size:12px;font-weight:700;border:2px solid var(--border);background:var(--surface2);color:var(--muted);transition:all var(--tr)}
    .sub-tab:hover{border-color:var(--primary);color:var(--primary)}
    .sub-tab.active{border-color:var(--primary);background:var(--primary-hl);color:var(--primary)}
    @media(max-width:900px){.slots-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
    @media(max-width:640px){.main{padding:20px 16px 40px}.slots-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}thead th,tbody td{padding:10px 14px}.live-clock{display:none}}

<body>
<div class="admin-strip" id="adminStrip"><div class="admin-strip-text"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Admin-Modus aktiv — <span id="adminLabel"></span></div><button class="btn-logout" onclick="adminLogout()">Abmelden</button></div>
<header class="header"><div class="hdr-left"><div class="logo-box"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M17 8h1a4 4 0 0 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg></div><div><div class="hdr-title">Pausentool</div><div class="hdr-sub">Pausentool für Chat-Agents</div></div></div><div class="hdr-right"><div class="status-chip" id="connStatus">Verbinde…</div><div class="live-clock" id="clock">--:--:--</div><button class="icon-btn" id="adminBtn" onclick="openAdminLogin()" title="Admin" aria-label="Admin-Login" style="opacity:.35"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></button><button class="icon-btn" id="themeBtn" aria-label="Theme wechseln"><svg id="themeIco" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button></div></header>
<main class="main" id="mainArea">
  <div class="dept-bar">
    <div class="dept-tabs">
      <button class="dept-tab" id="tab-b2c" onclick="setTop('b2c')">B2C</button>
      <button class="dept-tab" id="tab-b2b" onclick="setTop('b2b')">B2B</button>
    </div>
    <div class="sub-tabs" id="subTabs">
      <button class="sub-tab" id="tab-b2c-line" onclick="setDept('b2c-line')">Line</button>
      <button class="sub-tab" id="tab-b2c-chat" onclick="setDept('b2c-chat')">Chat</button>
    </div>
  </div>
  <div class="sec-hdr"><div class="sec-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>Pausenslots</div><span class="slot-count" id="slotCount">0 / 4 belegt</span></div>
  <div class="slots-grid" id="slotsGrid"><div class="slot-card free"><div class="slot-lbl">Lade Slots…</div><div class="slot-icon-box"><svg class="coff" width="44" height="44" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path stroke-width="2.8" d="M12 24h32l-3 24H15L12 24z"/><path stroke-width="2.8" d="M44 28h4a6 6 0 0 1 0 12h-4"/><path stroke-width="2.5" d="M10 52h44"/><path stroke-width="2.2" d="M22 18 Q24 13 22 9"/><path stroke-width="2.2" d="M30 16 Q32 11 30 7"/><path stroke-width="2.2" d="M38 18 Q40 13 38 9"/></svg></div><div class="slot-hint">Bitte warten…</div></div></div>
  <div class="sec-hdr" style="margin-top:8px"><div class="sec-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>Pausenübersicht</div></div>
  <div class="tbl-wrap"><table><thead><tr><th>Name</th><th>Start</th><th>Ende</th><th style="text-align:center">Slot</th><th style="text-align:center">Status</th></tr></thead><tbody id="tblBody"><tr class="empty-row"><td colspan="5">☕ Noch keine Pausen — klicke auf einen freien Slot!</td></tr></tbody></table></div>

<script>
let allDepts={}; let activeDept='b2c-line'; let activeTop='b2c'; let isAdmin=false; let adminDepts=[]; let tmpSlot=null; let tmpDur=null; const socket=io();
(function(){const s=localStorage.getItem('pt_dept');if(s&&['b2b-line','b2c-line','b2c-chat'].includes(s)){activeDept=s;activeTop=s.startsWith('b2c')?'b2c':'b2b'}})();
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDT(d){if(!d)return '<span style="color:var(--faint)">—</span>';const x=new Date(d);return x.toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+x.toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800)}
function coffeeSVG(sz=46){return `<svg class="coff" width="${sz}" height="${sz}" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path stroke-width="2.8" d="M12 24h32l-3 24H15L12 24z"/><path stroke-width="2.8" d="M44 28h4a6 6 0 0 1 0 12h-4"/><path stroke-width="2.5" d="M10 52h44"/><path stroke-width="2.2" d="M22 18 Q24 13 22 9"/><path stroke-width="2.2" d="M30 16 Q32 11 30 7"/><path stroke-width="2.2" d="M38 18 Q40 13 38 9"/></svg>`}
function lockSVG(){return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'}
async function api(url,opts={}){const res=await fetch(url,{headers:{'Content-Type':'application/json'},...opts});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.error||'Fehler');return data}
function applyState(state){allDepts=state;renderTabs();renderSlots();renderTable()}
function setTop(top){
  if(top==='b2b'){setDept('b2b-line')}
  else{const d=activeDept.startsWith('b2c')?activeDept:'b2c-line';setDept(d)}
}
function setDept(dept){
  activeDept=dept;activeTop=dept.startsWith('b2c')?'b2c':'b2b';
  localStorage.setItem('pt_dept',dept);
  renderTabs();renderSlots();renderTable();
}
function renderTabs(){
  document.getElementById('tab-b2b').classList.toggle('active',activeTop==='b2b');
  document.getElementById('tab-b2c').classList.toggle('active',activeTop==='b2c');
  const sub=document.getElementById('subTabs');
  sub.style.display=activeTop==='b2c'?'flex':'none';
  document.getElementById('tab-b2c-line').classList.toggle('active',activeDept==='b2c-line');
  document.getElementById('tab-b2c-chat').classList.toggle('active',activeDept==='b2c-chat');
}
function renderSlots(){
  const slots=(allDepts[activeDept]||{}).slots||[];
  const canAdmin=isAdmin&&adminDepts.includes(activeDept);
  const occ=slots.filter(s=>s.status==='occ').length;
  document.getElementById('slotCount').textContent=`${occ} / ${slots.length||4} belegt`;
  const html=slots.map(s=>{
    if(s.status==='occ'){return `<div class="slot-card occ" id="slot-${s.id}"><div class="slot-lbl">Pause ${s.id}</div><div class="slot-icon-box">${coffeeSVG(44)}</div><div class="slot-badge">belegt</div><div class="slot-agent">${esc(s.agent_name)}</div><div class="slot-cd" id="cd-${s.id}"></div><div class="slot-admin-bar">${canAdmin?`<button class="adm-btn adm-btn-release" onclick="confirmRelease(${s.id})">✕ Freigeben</button>`:''}</div></div>`}
    if(s.status==='locked'){return `<div class="slot-card locked" id="slot-${s.id}"><div class="slot-lbl">Pause ${s.id}</div><div class="slot-icon-box">${lockSVG()}</div><div class="slot-locked-badge">🔒 Gesperrt</div><div class="slot-admin-bar">${canAdmin?`<button class="adm-btn adm-btn-unlock" onclick="toggleLock(${s.id},false)">🔓 Öffnen</button>`:''}</div></div>`}
    return `<div class="slot-card free" id="slot-${s.id}" role="button" tabindex="0" onclick="openStep1(${s.id})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openStep1(${s.id})}"><div class="slot-lbl">Pause ${s.id}</div><div class="slot-icon-box">${coffeeSVG(44)}</div><div class="slot-hint">Klicken zum Buchen</div><div class="slot-admin-bar">${canAdmin?`<button class="adm-btn adm-btn-lock" onclick="event.stopPropagation();toggleLock(${s.id},true)">🔒 Sperren</button>`:''}</div></div>`
  }).join('');
  document.getElementById('slotsGrid').innerHTML=html||'<div class="slot-card free"><div class="slot-lbl">Keine Slots</div><div class="slot-hint">Bitte Backend prüfen</div></div>';
  const main=document.getElementById('mainArea');
  if(canAdmin)main.classList.add('is-admin');else main.classList.remove('is-admin');
  updateCountdowns();
}
function renderTable(){
  const logEntries=(allDepts[activeDept]||{}).log||[];
  const visible=logEntries.filter(e=>e.active||(e.end_time&&(Date.now()-new Date(e.end_time).getTime())<30000));
  const body=document.getElementById('tblBody');
  if(!visible.length){body.innerHTML='<tr class="empty-row"><td colspan="5">☕ Noch keine Pausen — klicke auf einen freien Slot!</td></tr>';return}
  body.innerHTML=visible.map(e=>`<tr><td class="td-name">${esc(e.agent_name)}</td><td class="td-time">${fmtDT(e.start_time)}</td><td class="td-time">${fmtDT(e.end_time)}</td><td class="td-slot">${e.slot_id}</td><td style="text-align:center">${e.forced?'<span class="b-forced">⚠ Freigegeben</span>':e.active?'<span class="b-active">Aktiv</span>':'<span class="b-done">✓ Fertig</span>'}</td></tr>`).join('')
}
function updateCountdowns(){
  const slots=(allDepts[activeDept]||{}).slots||[];
  slots.forEach(s=>{if(s.status!=='occ'||!s.end_time)return;const el=document.getElementById(`cd-${s.id}`);if(!el)return;const rem=new Date(s.end_time).getTime()-Date.now();if(rem<=0){el.textContent='⏱ 0:00';return}const m=Math.floor(rem/60000),sec=Math.floor((rem%60000)/1000);el.textContent=`⏱ ${m}:${String(sec).padStart(2,'0')}`})
}
setInterval(()=>{updateCountdowns();renderTable()},1000);
function openStep1(slotId){tmpSlot=slotId;tmpDur=null;document.getElementById('mBody').innerHTML=`<div class="m-icon">${coffeeSVG(26)}</div><div class="m-title">Pausenlänge wählen</div><div class="m-sub">Wähle deine Pausenlänge für <strong>Pause ${slotId}</strong>.</div><div class="dur-grid"><button class="dur-btn" id="d5" onclick="pickDur(5)"><span class="dur-num">5</span><span class="dur-unit">Minuten</span></button><button class="dur-btn" id="d10" onclick="pickDur(10)"><span class="dur-num">10</span><span class="dur-unit">Minuten</span></button></div><div class="m-actions"><button class="btn-cancel" onclick="closeModal()">Abbrechen</button><button class="btn-ok" id="durOk" disabled onclick="openStep2()">Weiter →</button></div>`;showModal()}
function pickDur(min){tmpDur=min;document.querySelectorAll('.dur-btn').forEach(b=>b.classList.remove('sel'));document.getElementById('d'+min).classList.add('sel');document.getElementById('durOk').disabled=false}
function openStep2(){document.getElementById('mBody').innerHTML=`<div class="m-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="m-title">Bitte gib deinen Namen ein</div><div class="m-sub">Pause ${tmpSlot} · ${tmpDur} Minuten</div><div class="inp-wrap"><label class="inp-lbl" for="nameInp">Name</label><input class="txt-inp" type="text" id="nameInp" placeholder="z. B. Max Mustermann" autocomplete="off" maxlength="60"><div class="err-hint" id="nameErr">Bitte gib deinen Namen ein.</div></div><div class="m-actions"><button class="btn-cancel" onclick="closeModal()">Abbrechen</button><button class="btn-ok" onclick="confirmPause()">OK ✓</button></div>`;showModal();const inp=document.getElementById('nameInp');setTimeout(()=>inp&&inp.focus(),50);inp.addEventListener('keydown',e=>{if(e.key==='Enter')confirmPause();if(e.key==='Escape')closeModal()})}
async function confirmPause(){const inp=document.getElementById('nameInp');const name=inp.value.trim();if(!name){inp.classList.add('err');document.getElementById('nameErr').classList.add('show');inp.focus();return}try{await api('/api/pause/start',{method:'POST',body:JSON.stringify({slotId:tmpSlot,agentName:name,durationMinutes:tmpDur,dept:activeDept})});closeModal();showToast(`☕ ${name} ist auf Pause (${tmpDur} Min.)`)}catch(e){showToast(e.message)}}
function openAdminLogin(){if(isAdmin){adminLogout();return}document.getElementById('mBody').innerHTML=`<div class="m-icon admin-ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div class="m-title">Teamleiter-Login</div><div class="m-sub">Bitte Admin-Passwort eingeben.</div><div class="inp-wrap"><label class="inp-lbl" for="passInp">Passwort</label><input class="txt-inp" type="password" id="passInp" placeholder="Passwort…" autocomplete="off"><div class="err-hint" id="passErr">Falsches Passwort.</div></div><div class="m-actions"><button class="btn-cancel" onclick="closeModal()">Abbrechen</button><button class="btn-ok amber" onclick="checkAdminPass()">Anmelden</button></div>`;showModal();const inp=document.getElementById('passInp');setTimeout(()=>inp&&inp.focus(),50);inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkAdminPass();if(e.key==='Escape')closeModal()})}
async function checkAdminPass(){const inp=document.getElementById('passInp');try{const data=await api('/api/admin/login',{method:'POST',body:JSON.stringify({password:inp.value})});isAdmin=true;adminDepts=data.depts;closeModal();const label=adminDepts.length===3?'B2B & B2C':adminDepts.every(d=>d.startsWith('b2b'))?'B2B':'B2C';document.getElementById('adminLabel').textContent=label;document.getElementById('adminStrip').classList.add('show');document.getElementById('adminBtn').classList.add('active-admin');document.getElementById('adminBtn').style.opacity='1';renderSlots();showToast('✅ Admin-Modus aktiviert')}catch(e){inp.classList.add('err');document.getElementById('passErr').classList.add('show');inp.value='';inp.focus()}}
function adminLogout(){isAdmin=false;adminDepts=[];document.getElementById('adminStrip').classList.remove('show');document.getElementById('adminBtn').classList.remove('active-admin');document.getElementById('adminBtn').style.opacity='.35';renderSlots();showToast('Admin-Modus beendet')}
async function toggleLock(slotId,lock){try{await api(lock?'/api/slot/lock':'/api/slot/unlock',{method:'POST',body:JSON.stringify({slotId,dept:activeDept})});showToast(lock?`🔒 Slot ${slotId} gesperrt`:`🔓 Slot ${slotId} geöffnet`)}catch(e){showToast(e.message)}}
function confirmRelease(slotId){document.getElementById('mBody').innerHTML=`<div class="m-icon admin-ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div class="m-title">Slot freigeben?</div><div class="m-sub">Möchtest du Slot ${slotId} manuell freigeben?</div><div class="m-actions"><button class="btn-cancel" onclick="closeModal()">Abbrechen</button><button class="btn-danger" onclick="doRelease(${slotId})">Freigeben</button></div>`;showModal()}
async function doRelease(slotId){try{await api('/api/pause/end',{method:'POST',body:JSON.stringify({slotId,forced:true,dept:activeDept})});closeModal();showToast(`⚠ Slot ${slotId} freigegeben`)}catch(e){showToast(e.message)}}
function showModal(){document.getElementById('overlay').classList.add('show')} function closeModal(){document.getElementById('overlay').classList.remove('show');tmpSlot=null;tmpDur=null}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal()});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()})
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}setInterval(updateClock,1000);updateClock();
(function(){const btn=document.getElementById('themeBtn'),ico=document.getElementById('themeIco'),html=document.documentElement;let th=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';html.setAttribute('data-theme',th);function setIco(t){ico.innerHTML=t==='dark'?'<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>':'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'}setIco(th);btn.addEventListener('click',()=>{th=th==='dark'?'light':'dark';html.setAttribute('data-theme',th);setIco(th)})})();
function setConn(ok){const el=document.getElementById('connStatus');el.textContent=ok?'Verbunden':'Offline';el.className='status-chip '+(ok?'ok':'err')}
renderTabs();
socket.on('connect',()=>setConn(true));socket.on('disconnect',()=>setConn(false));socket.on('state:update',state=>applyState(state));api('/api/state').then(applyState).catch(()=>setConn(false));
</script>
</body>
</html>
